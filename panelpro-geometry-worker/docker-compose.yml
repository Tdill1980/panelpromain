# PanelPro Geometry Worker — Droplet / single-host deployment.
#
#   docker compose up -d --build      # build native bindings + run detached
#   docker compose logs -f            # follow structured job logs
#   docker compose down               # stop
#
# Requires a sibling .env (see .env.example) with at least:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, a non-empty WEBHOOK_SECRET, and
#   WORKER_DOMAIN (the public HTTPS hostname Caddy will serve).
services:
  worker:
    build: .
    image: panelpro-worker
    container_name: panelpro-print-engine
    restart: unless-stopped
    # Not published to the public internet — Caddy reaches it over the internal
    # compose network as "worker:8080". The localhost bind is for on-box debug
    # only (e.g. `curl 127.0.0.1:8080/healthz`).
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env

    # ── Big-raster memory headroom ────────────────────────────────────────────
    # A single 30000×9150 job peaks around 5–8 GB across its native buffers.
    # mem_limit is a guard, not a target: set it BELOW your Droplet's RAM so a
    # runaway job is killed instead of taking the host down. Tune to your box:
    #   8 GB Droplet  -> ~6g    16 GB Droplet -> ~13g
    # Comment it out entirely to let the worker use all host RAM + swap.
    mem_limit: 6g
    mem_reservation: 2g

    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Structured JSON logs; cap so they don't fill the Droplet disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── TLS reverse proxy ───────────────────────────────────────────────────────
  # Terminates HTTPS at https://${WORKER_DOMAIN} and forwards to the worker.
  # Automatic certificates via Let's Encrypt — see ./Caddyfile.
  caddy:
    image: caddy:2-alpine
    container_name: panelpro-caddy
    restart: unless-stopped
    depends_on:
      - worker
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      # Pulled from .env via compose substitution; fails fast if unset.
      WORKER_DOMAIN: ${WORKER_DOMAIN:?set WORKER_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persisted certs/keys (survives restarts)
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
